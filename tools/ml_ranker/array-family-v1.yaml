schema_version: 1
name: array-family-v1
description: Initial family-level split manifest for array benchmark ML evaluations.
benchmark_root: examples/array

policy:
  split_unit: family
  allowed_splits:
    - train
    - dev
    - eval
  no_cross_family_leakage: true
  split_before_training_row_extraction: true
  notes:
    - Keep every benchmark in a family on the same split.
    - Use parent_family for coarse reporting; use id as the split unit.
    - Update each family split manually to train, dev, or eval.
    - Eval families should remain untouched until final reporting.

families:
